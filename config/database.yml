# PostgreSQL. Versions 9.3 and up are supported.
#
# Install the pg driver:
#   gem install pg
# On macOS with Homebrew:
#   brew install postgresql
# On Debian/Ubuntu:
#   apt-get install libpq-dev
#
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>
  username: <%= ENV.fetch("DATABASE_USERNAME", ENV["USER"]) %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", "") %>
  # Disable GSSAPI/Kerberos negotiation in libpq. Apple's Kerberos plugins
  # segfault in forked children (Solid Queue workers) on macOS.
  gssencmode: disable

development:
  <<: *default
  database: build_new_development

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: build_new_test

# Solid Queue, Solid Cache, and Solid Cable all share this single primary database.
production:
  <<: *default
  database: build_new_production
  url: <%= ENV["DATABASE_URL"] %>
